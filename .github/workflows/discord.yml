name: Discord Notifications

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT_NAME:  ${{ github.event_name }}
          REPO:        ${{ github.repository }}
          ACTOR:       ${{ github.actor }}
          REF_NAME:    ${{ github.ref_name }}
          COMMIT_MSG:  ${{ github.event.head_commit.message }}
          PR_TITLE:    ${{ github.event.pull_request.title }}
          PR_ACTION:   ${{ github.event.action }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            MESSAGE=$(printf "🚀 **Push Event**\n\nRepository: %s\nBranch: %s\nPushed by: %s\n\nCommit: %s" "$REPO" "$REF_NAME" "$ACTOR" "$COMMIT_MSG")
          else
            MESSAGE=$(printf "🔀 **Pull Request Event**\n\nRepository: %s\nPR: %s\nAction: %s\nBy: %s" "$REPO" "$PR_TITLE" "$PR_ACTION" "$ACTOR")
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$(jq -n --arg msg "$MESSAGE" '{"content": $msg}')" \
               "$DISCORD_WEBHOOK"